<div id="gripes">
    <ul>
        {% for gripe_id, gripe in gripes.items()|reverse %}
        <li>
            <div>
                <span>{{ gripe.text | safe }}</span>
                {% if gripe.added %}
                <span class="gripe-meta">Added {{ gripe.added | friendly_date }}</span>
                {% endif %}
            </div>
            <button class="delete-btn"
                    hx-delete="/admin/gripes/{{ gripe_id }}"
                    hx-target="#gripes"
                    hx-swap="outerHTML">
                Delete
            </button>
        </li>
        {% else %}
        <li>
            <span>No gripes yet.</span>
        </li>
        {% endfor %}
    </ul>
</div>
