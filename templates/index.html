<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-VILE</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <a href="https://c-ville.com/">
            <img src="/static/logo.png" height="50" alt="C-VILE">
        </a>
    </header>

    <main>
        <section>
            <div id="gripe" hx-get="/random-gripe" hx-trigger="load">
            </div>
        </section>

        <nav aria-label="Main navigation">
            <button onclick="document.getElementById('submit-modal').showModal()">
                Submit your own
            </button>

            <button
                hx-get="/random-gripe"
                hx-target="#gripe"
                hx-swap="innerText">
                    Another →
            </button>
        </nav>
    </main>

    <dialog id="submit-modal">
        <form id="submit-form" hx-post="/submit-a-gripe" hx-target="body" hx-swap="beforeend">
            <label for="gripe-input">What's your gripe?</label>
            <textarea id="gripe-input" name="gripe" rows="3" maxlength="500"
                      placeholder="Go ahead, let it out..." required></textarea>
            <div class="modal-buttons">
                <button type="button" onclick="this.closest('dialog').close()">Nevermind</button>
                <button type="submit">Gripe!</button>
            </div>
        </form>
    </dialog>
    <script>
        document.getElementById('submit-form').addEventListener('htmx:afterRequest', function() {
            document.getElementById('submit-modal').close();
            this.reset();
        });
    </script>
</body>
</html>
